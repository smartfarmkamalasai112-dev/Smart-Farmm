7ho[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps = 
	knolleary/PubSubClient @ ^2.8

[env:node1_sensor]
build_src_filter = -<*> +<node1_sensor.cpp>
lib_deps = 
	${env.lib_deps}
	claws/BH1750 @ ^1.3.0
	wifwaf/MH-Z19 @ ^1.5.4
	4-20ma/ModbusMaster @ ^2.0.1
	plerup/EspSoftwareSerial @ ^8.2.0
	bblanchon/ArduinoJson@^7.4.2

[env:node2_relay]
build_src_filter = -<*> +<node2_relay.cpp>
upload_port = /dev/ttyUSB0
monitor_port = /dev/ttyUSB0
lib_deps = 
	${env.lib_deps}
	bblanchon/ArduinoJson@^7.4.2

[env:node3_soil]
build_src_filter = -<*> +<node3_soil.cpp>
lib_deps = 
	${env.lib_deps}
	knolleary/PubSubClient @ ^2.8
	4-20ma/ModbusMaster @ ^2.0.1
	plerup/EspSoftwareSerial @ ^8.2.0
	bblanchon/ArduinoJson@^7.4.2
